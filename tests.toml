#:schema https://raw.githubusercontent.com/YunoHost/apps/master/schemas/tests.v1.schema.json

test_format = 1.0

[default]
    exclude = ["install.multi"]

    # Installation without registration is intentional: it validates package
    # lifecycle deterministically without embedding a live external credential.
    args.gitea_url = "https://gitea.invalid"
    args.token = ""
