name: Update stable upstream release

on:
  schedule:
    - cron: "31 4 * * *"
  workflow_dispatch:
  push:
    paths:
      - manifest.toml
      - tools/update_upstream.py
      - tools/validate_package.py
      - .github/workflows/upstream-update.yml

permissions:
  contents: write

concurrency:
  group: upstream-update
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7.0.0
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v6.3.0
        with:
          python-version: "3.12"
      - name: Resolve newest stable Runner release
        run: python3 tools/update_upstream.py
      - name: Validate generated package state
        run: |
          set -euo pipefail
          python3 tools/validate_package.py
          python3 -m py_compile tools/*.py
          find scripts -maxdepth 1 -type f -print0 |
            sort -z |
            while IFS= read -r -d '' script; do
              echo "Checking ${script}"
              bash -n "$script"
            done
      - name: Run official YunoHost package linter
        run: |
          set -euo pipefail
          linter_dir="$RUNNER_TEMP/package_linter"
          git clone --depth 1 https://github.com/YunoHost/package_linter.git "$linter_dir"
          python3 -m venv "$linter_dir/venv"
          "$linter_dir/venv/bin/python" -m pip install --requirement "$linter_dir/requirements.txt"
          linter_report="$RUNNER_TEMP/package-linter.json"
          set +e
          "$linter_dir/venv/bin/python" "$linter_dir/package_linter.py" --json . > "$linter_report"
          linter_status=$?
          set -e
          python3 - "$linter_report" "$linter_status" <<'PY'
          import json
          import sys

          report_path, status = sys.argv[1:]
          report = json.load(open(report_path, encoding="utf-8"))
          errors = report.get("error", [])
          critical = report.get("critical", [])
          allowed_critical = {"AppCatalog.is_in_catalog"}
          unexpected_critical = [name for name in critical if name not in allowed_critical]
          if errors or unexpected_critical:
              print(f"package linter errors={errors} critical={unexpected_critical}", file=sys.stderr)
              raise SystemExit(1)
          if critical and set(critical) <= allowed_critical:
              print("accepted documented exception: AppCatalog.is_in_catalog")
              raise SystemExit(0)
          if int(status) != 0 or critical:
              print(f"package linter exited {status} without an allowed exception", file=sys.stderr)
              raise SystemExit(1)
          print("package linter passed")
          PY
      - name: Commit immutable release pins
        run: |
          if git diff --quiet; then
            echo "No stable update available"
            exit 0
          fi
          git config user.name "gitea-runner-ynh-updater"
          git config user.email "gitea-runner-ynh-updater@users.noreply.github.com"
          git add manifest.toml
          version=$(python3 -c 'import tomllib; print(tomllib.load(open("manifest.toml","rb"))["version"])')
          git commit -m "Update Gitea Runner to ${version}"
          git push origin HEAD:master
