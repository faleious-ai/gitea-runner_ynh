name: Package validation

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7.0.0
      - uses: actions/setup-python@v6.3.0
        with:
          python-version: "3.12"
      - name: Validate package invariants
        run: python3 tools/validate_package.py
      - name: Compile maintenance tools
        run: python3 -m py_compile tools/*.py
      - name: Parse shell scripts
        run: |
          set -euo pipefail
          find scripts -maxdepth 1 -type f -print0 |
            sort -z |
            while IFS= read -r -d '' script; do
              echo "Checking ${script}"
              bash -n "$script"
            done
      - name: Run official YunoHost package linter
        run: |
          set -euo pipefail
          linter_dir="$RUNNER_TEMP/package_linter"
          git clone --depth 1 https://github.com/YunoHost/package_linter.git "$linter_dir"
          python3 -m venv "$linter_dir/venv"
          "$linter_dir/venv/bin/python" -m pip install --requirement "$linter_dir/requirements.txt"
          linter_report="$RUNNER_TEMP/package-linter.json"
          set +e
          "$linter_dir/venv/bin/python" "$linter_dir/package_linter.py" --json . > "$linter_report"
          linter_status=$?
          set -e
          python3 - "$linter_report" "$linter_status" <<'PY'
          import json
          import sys

          report_path, status = sys.argv[1:]
          report = json.load(open(report_path, encoding="utf-8"))
          errors = report.get("error", [])
          critical = report.get("critical", [])
          allowed_critical = {"AppCatalog.is_in_catalog"}
          unexpected_critical = [name for name in critical if name not in allowed_critical]
          if errors or unexpected_critical:
              print(f"package linter errors={errors} critical={unexpected_critical}", file=sys.stderr)
              raise SystemExit(1)
          if critical and set(critical) <= allowed_critical:
              print("accepted documented exception: AppCatalog.is_in_catalog")
              raise SystemExit(0)
          if int(status) != 0 or critical:
              print(f"package linter exited {status} without an allowed exception", file=sys.stderr)
              raise SystemExit(1)
          print("package linter passed")
          PY
      - name: Verify declared binaries
        run: |
          python3 - <<'PY'
          import hashlib, pathlib, tomllib, urllib.request
          manifest = tomllib.loads(pathlib.Path('manifest.toml').read_text())
          source = manifest['resources']['sources']['main']
          for arch in manifest['integration']['architectures']:
              item = source[arch]
              request = urllib.request.Request(item['url'], headers={'User-Agent':'gitea-runner-ynh-ci'})
              digest = hashlib.sha256()
              with urllib.request.urlopen(request, timeout=180) as response:
                  while chunk := response.read(1024 * 1024): digest.update(chunk)
              assert digest.hexdigest() == item['sha256'], arch
              print(f'{arch}: verified')
          PY
