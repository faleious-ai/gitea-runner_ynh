#:schema https://raw.githubusercontent.com/YunoHost/apps/master/schemas/manifest.v2.schema.json

packaging_format = 2

id = "gitea-runner"
name = "Gitea Runner"
description.en = "Official runner for Gitea Actions"
description.fr = "Runner officiel pour Gitea Actions"
description.pt = "Runner oficial para o Gitea Actions"

# The automated updater replaces this with the newest stable validated release.
version = "0.2.6~ynh2"

maintainers = ["eric_G", "faleious-ai"]

[upstream]
license = "MIT"
website = "https://docs.gitea.com/usage/actions/runner"
admindoc = "https://docs.gitea.com/usage/actions/runner"
code = "https://gitea.com/gitea/runner"

[integration]
yunohost = ">= 12.1.38"
helpers_version = "2.1"
architectures = ["amd64", "arm64"]
multi_instance = false
ldap = "not_relevant"
sso = "not_relevant"
disk = "250M"
ram.build = "0M"
ram.runtime = "150M"

[install]
    [install.gitea_url]
    ask.en = "URL of the Gitea instance"
    ask.fr = "URL de l’instance Gitea"
    ask.pt = "URL da instância Gitea"
    type = "url"
    example = "https://git.example.org"

    [install.token]
    ask.en = "Runner registration token (leave empty to install unregistered)"
    ask.fr = "Jeton d’enregistrement du runner (laisser vide pour installer sans enregistrer)"
    ask.pt = "Token de registro do runner (deixe vazio para instalar sem registrar)"
    type = "string"
    optional = true

[resources]
    [resources.sources]
        [resources.sources.main]
        amd64.url = "https://gitea.com/gitea/act_runner/releases/download/v0.2.6/act_runner-0.2.6-linux-amd64"
        amd64.sha256 = "234c2bdb871e7b0bfb84697f353395bfc7819faf9f0c0443845868b64a041057"
        arm64.url = "https://gitea.com/gitea/act_runner/releases/download/v0.2.6/act_runner-0.2.6-linux-arm64"
        arm64.sha256 = "f5c477b54d7db5289acee6b59cd96b28de4bdda809f79e830662d4c952b2914d"
        in_subdir = false
        extract = false
        rename = "runner"

    [resources.system_user]

    [resources.install_dir]

    [resources.data_dir]

    [resources.apt]
    packages = "ca-certificates, git, docker.io"
